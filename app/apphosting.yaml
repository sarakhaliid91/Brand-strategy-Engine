# Firebase App Hosting configuration for the Brand Strategy Engine (Next.js).
#
# Set these as environment variables / secrets in the Firebase console
# (App Hosting → your backend → Settings → Environment), or via the CLI
# (e.g. `firebase apphosting:secrets:set DATABASE_URL`):
#   - DATABASE_URL        (your hosted Postgres connection string)
#   - AUTH_SECRET         (a random 32+ char string)
#   - ANTHROPIC_API_KEY   (optional, enables Claude drafting + competitor research)
#   - OPENAI_API_KEY      (optional, enables ChatGPT drafting)
#   - AI_DEFAULT_PROVIDER (optional, "anthropic" or "openai")

runConfig:
  minInstances: 0
  maxInstances: 2
  cpu: 1
  memoryMiB: 1024
